name: ci

on:
  push:
    branches: ["master"]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a
        # https://github.com/docker/setup-qemu-action/releases/tag/v4.0.0
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4
        # https://github.com/docker/setup-buildx-action/releases/tag/v4.0.0

      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        # https://github.com/docker/login-action/tree/v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      -
        name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        # https://github.com/docker/build-push-action/releases/tag/v7.0.0
        with:
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
              VERSION=${{ github.ref_name }}
          tags: ghcr.io/deltablot/partage:latest,ghcr.io/deltablot/partage:${{ github.ref_name }}
